# Rails web service — exposed within the cluster and via Ingress
apiVersion: v1
kind: Service
metadata:
  name: atlaz
  namespace: staging-1
spec:
  selector:
    app: atlaz
    component: web
  ports:
    - port: 3013
      targetPort: 3013
---
# Typesense internal service — used by Rails/Sidekiq pods
apiVersion: v1
kind: Service
metadata:
  name: atlaz-typesense
  namespace: staging-1
spec:
  selector:
    app: atlaz-typesense
  ports:
    - port: 8108
      targetPort: 8108
