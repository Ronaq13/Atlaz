apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlaz-typesense
  namespace: staging-1
spec:
  serviceName: atlaz-typesense
  replicas: 1
  selector:
    matchLabels:
      app: atlaz-typesense
  template:
    metadata:
      labels:
        app: atlaz-typesense
    spec:
      containers:
        - name: atlaz-typesense
          image: typesense/typesense:27.0
          args:
            - "--data-dir=/data"
            - "--api-key=$(TYPESENSE_API_KEY)"
            - "--enable-cors"
          env:
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atlaz-secrets
                  key: TYPESENSE_API_KEY
          ports:
            - containerPort: 8108
          volumeMounts:
            - name: typesense-data
              mountPath: /data
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: typesense-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path   # k3s default; change for other distros
        resources:
          requests:
            storage: 20Gi
