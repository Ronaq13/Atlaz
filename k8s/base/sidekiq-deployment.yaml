apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlaz-sidekiq
  labels:
    app: atlaz
    component: sidekiq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlaz
      component: sidekiq
  template:
    metadata:
      labels:
        app: atlaz
        component: sidekiq
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: atlaz-sidekiq
          image: ghcr.io/ronaq13/atlaz:latest
          command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
          envFrom:
            - configMapRef:
                name: atlaz-config
            - secretRef:
                name: atlaz-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
