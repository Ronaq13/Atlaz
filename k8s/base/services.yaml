# Rails web service - native Nginx proxies to the NodePort on the host
apiVersion: v1
kind: Service
metadata:
  name: atlaz
spec:
  type: NodePort
  selector:
    app: atlaz
    component: web
  ports:
    - port: 3013
      targetPort: 3013
      nodePort: 30013
---
# Typesense internal service - used by Rails/Sidekiq pods
apiVersion: v1
kind: Service
metadata:
  name: atlaz-typesense
spec:
  selector:
    app: atlaz-typesense
  ports:
    - port: 8108
      targetPort: 8108
