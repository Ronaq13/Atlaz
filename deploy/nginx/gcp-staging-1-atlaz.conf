# Add this inside the existing HTTPS server block for
# gcp-staging-1-partners.thrillo.dev in staging-partners.conf
#
# /atlaz/* -> k8s NodePort (atlaz Rails on port 3013 in the pod)
#
# Example:
#   https://gcp-staging-1-partners.thrillo.dev/atlaz/api/v1/hotels/search?q=dubai
#   -> http://127.0.0.1:30013/api/v1/hotels/search?q=dubai

location = /atlaz {
  return 301 /atlaz/;
}

location ^~ /atlaz/ {
  proxy_pass http://127.0.0.1:30013/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection "";
  proxy_connect_timeout 60;
  proxy_send_timeout 60;
  proxy_read_timeout 60;
  proxy_redirect off;
}
