# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

require:
  - ./lib/rubocop/cop/atlaz/no_queries_in_normalizers.rb

Atlaz/NoQueriesInNormalizers:
  Enabled: true

